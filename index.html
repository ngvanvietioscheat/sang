<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Koder Đa Chức Năng | Anime Fps & Led</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css?family=Quicksand:700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0; padding: 0;
      min-height: 100vh;
      font-family: 'Quicksand', Arial, sans-serif;
      background: #1a1a1a;
      overflow-x: hidden;
    }
    .bg-anime {
      position: fixed;
      z-index: 0;
      width: 100vw; height: 100vh;
      left: 0; top: 0;
      object-fit: cover;
      filter: brightness(0.68) blur(1.5px);
      pointer-events: none;
      user-select: none;
    }
    .led-overlay {
      position: fixed;
      z-index: 1;
      left: 0; top: 0; width: 100vw; height: 100vh;
      pointer-events: none;
      mix-blend-mode: screen;
      animation: ledFlash 2s linear infinite;
    }
    @keyframes ledFlash {
      0% { filter: hue-rotate(0deg) brightness(1.1) blur(2px);}
      50% { filter: hue-rotate(120deg) brightness(1.5) blur(3px);}
      100%{ filter: hue-rotate(360deg) brightness(1.1) blur(2px);}
    }
    .container {
      z-index: 2;
      position: relative;
      max-width: 400px;
      margin: 48px auto 0 auto;
      background: rgba(34,34,44,0.92);
      border-radius: 24px;
      box-shadow: 0 8px 40px 0 #000a, 0 1.5px 5px 0 #fff3 inset;
      padding: 28px 18px 20px 18px;
      text-align: center;
      border: 2.5px solid #e1e1e155;
      backdrop-filter: blur(2.5px);
    }
    h1 {
      font-size: 2.1em;
      color: #ffd700;
      text-shadow: 0 2px 12px #f5005755, 0 1px 0 #fff8;
      margin-bottom: 12px;
    }
    .feature-list {
      display: flex; flex-wrap: wrap; gap: 16px;
      justify-content: center;
      margin-top: 18px; margin-bottom: 12px;
    }
    .feature {
      width: 162px; min-height: 60px;
      margin: 0;
      background: #23232b;
      border: 2px solid #ffd70044;
      border-radius: 13px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      font-size: 1.13em;
      box-shadow: 0 2.5px 20px 0 #0008;
      transition: all 0.14s;
      position: relative;
      cursor: pointer;
      user-select: none;
      font-weight: 700;
    }
    .feature.active {
      background: linear-gradient(90deg,#ff73b8 10%, #ffd700 90%);
      color: #23232b;
      border-color: #fff9;
      box-shadow: 0 2px 14px #ffd70066, 0 1px 0 #fff8;
      animation: pulse 0.9s infinite alternate;
    }
    .feature .status {
      font-size: 0.99em;
      padding: 2px 10px;
      border-radius: 9px;
      margin-left: 6px;
      background: #262;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 1px 4px #0007;
      transition: background 0.2s, color 0.2s;
    }
    .feature.active .status {
      background: #ffd700;
      color: #23232b;
      border: 1.3px solid #ff73b8;
    }
    @keyframes pulse {
      to { box-shadow: 0 0 30px #ffd700ee, 0 1px 0 #fff8; }
    }
    .music-ctrl {
      margin-top: 14px;
      color: #fff;
      font-size: 1.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      user-select: none;
    }
    .music-btn {
      background: linear-gradient(90deg,#ffd700,#ff73b8);
      color: #23232b;
      border: none;
      border-radius: 50%;
      width: 42px; height: 42px;
      font-size: 1.4em;
      margin-left: 4px;
      box-shadow: 0 2px 12px #ffd700aa;
      cursor: pointer;
      transition: background 0.14s;
      outline: none;
    }
    .music-btn:active { background: #ff73b8; color: #ffd700; }
    .footer {
      margin-top: 22px;
      color: #ffb3ee;
      font-size: 0.98em;
      letter-spacing: 0.4px;
      opacity: 0.8;
      text-shadow: 0 1px 8px #fff2;
    }
    /* Đom đóm bay */
    .firefly {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: radial-gradient(circle, #fefefe 60%, #ffe066 85%, #ffd70011 100%);
      opacity: 0.92;
      box-shadow: 0 0 18px 7px #ffd70099, 0 0 6px 1px #fff9;
      animation: fly 14s linear infinite;
    }
    @keyframes fly {
      0%   { transform: translateY(0)   translateX(0)   scale(1);}
      25%  { transform: translateY(-110px) translateX(120px) scale(1.2);}
      50%  { transform: translateY(-70px) translateX(-60px) scale(0.95);}
      75%  { transform: translateY(80px)  translateX(150px) scale(1.08);}
      100% { transform: translateY(0)   translateX(0)   scale(1);}
    }
    @media (max-width: 500px) {
      .container {padding: 14px 2vw;}
      .feature {width: 99vw; min-width: 0; max-width: 98vw;}
      h1 {font-size: 1.3em;}
    }
  </style>
</head>
<body>
  <!-- Ảnh nền Anime nữ -->
  <img class="bg-anime" src="https://i.imgur.com/N2vUPyF.jpg" alt="anime girl background">
  <!-- Hiệu ứng led overlay -->
  <canvas class="led-overlay" id="ledCanvas"></canvas>
  <!-- Đom đóm bay -->
  <div id="fireflies"></div>

  <div class="container">
    <h1>Koder Đa Chức Năng <br><span style="font-size:0.6em;color:#fff6;font-weight:500;">Anime FPS • Led • Nhạc Đom Đóm</span></h1>
    <div class="feature-list" id="featureList">
      <!-- Các chức năng sẽ render ở đây bằng JS -->
    </div>
    <div class="music-ctrl">
      <span>🎶 Đom Đóm Remix</span>
      <button id="musicBtn" class="music-btn" title="Bật/Tắt nhạc">⏸️</button>
    </div>
    <div class="footer">
      <b>Tool giải trí - Không can thiệp game thật!</b><br>
      Made by <a href="https://github.com/m-h-ieu" target="_blank" style="color:#ffd700;text-decoration:underline;">m-h-ieu</a>
    </div>
  </div>
  <!-- Nhạc nền Đom Đóm Remix (YouTube mp3) -->
  <audio id="bgMusic" loop autoplay>
    <source src="https://cdn.pixabay.com/audio/2023/03/27/audio_12eabf2f78.mp3" type="audio/mpeg">
  </audio>
  <script>
    // Danh sách chức năng
    const features = [
      {name: "Nhẹ Tâm",        key: "nhetam",    color: "#ffd700"},
      {name: "Đầm Tâm",        key: "damtam",    color: "#73ffd7"},
      {name: "Fix Rung",       key: "fixrung",   color: "#f50057"},
      {name: "Fix Lố",         key: "fixlo",     color: "#00e676"},
      {name: "Nhạy Tâm",       key: "nhaytam",   color: "#ff9100"},
      {name: "Lock Tâm",       key: "locktam",   color: "#ff73b8"},
      {name: "Tối Ưu",         key: "toiuu",     color: "#a0f"},
      {name: "Buff FPS",       key: "bufffps",   color: "#00b0ff"},
      {name: "Ghim Tâm",       key: "ghimtam",   color: "#d500f9"},
      {name: "Auto HeadShot",  key: "headshot",  color: "#ff1744"}
    ];
    // Render features
    const featureList = document.getElementById('featureList');
    features.forEach((f, idx) => {
      const div = document.createElement('div');
      div.className = 'feature';
      div.style.borderColor = f.color + "99";
      div.innerHTML = `${f.name}<span class="status" id="status_${f.key}">Tắt</span>`;
      div.onclick = () => toggleFeature(f, div);
      featureList.appendChild(div);
    });
    // Trạng thái chức năng
    let featureState = {};
    function toggleFeature(f, div) {
      featureState[f.key] = !featureState[f.key];
      div.classList.toggle('active', featureState[f.key]);
      let status = div.querySelector('.status');
      if (featureState[f.key]) {
        status.textContent = "Đã bật";
        status.style.background = f.color;
        status.style.color = "#222";
        flashEffect(div, f.color);
        playEffectSound();
      } else {
        status.textContent = "Tắt";
        status.style.background = "#262";
        status.style.color = "#fff";
      }
    }
    // Hiệu ứng flash
    function flashEffect(div, color) {
      div.animate([
        { boxShadow: `0 0 0px ${color}00` },
        { boxShadow: `0 0 25px 8px ${color}a8` },
        { boxShadow: `0 0 0px ${color}00` }
      ], { duration: 500, easing: "ease" });
    }
    // Âm báo hiệu ứng bật
    function playEffectSound() {
      let beep = new Audio("https://cdn.pixabay.com/audio/2022/07/26/audio_124bdbbe9d.mp3");
      beep.volume = 0.22;
      beep.play();
    }
    // Led nháy nháy
    const ledCanvas = document.getElementById('ledCanvas');
    function resizeLed() {
      ledCanvas.width = window.innerWidth;
      ledCanvas.height = window.innerHeight;
    }
    window.onresize = resizeLed; resizeLed();
    function drawLed() {
      const ctx = ledCanvas.getContext('2d');
      ctx.clearRect(0,0,ledCanvas.width,ledCanvas.height);
      for (let i=0;i<22;i++) {
        let x = Math.random()*ledCanvas.width;
        let y = Math.random()*ledCanvas.height;
        let r = 17 + Math.random()*13;
        let grad = ctx.createRadialGradient(x,y,1,x,y,r);
        grad.addColorStop(0,`hsla(${Math.floor(Math.random()*360)},100%,60%,1)`);
        grad.addColorStop(1,`hsla(${Math.floor(Math.random()*360)},100%,30%,0)`);
        ctx.beginPath();
        ctx.arc(x,y,r,0,2*Math.PI);
        ctx.fillStyle = grad;
        ctx.fill();
      }
      requestAnimationFrame(drawLed);
    }
    drawLed();
    // Đom đóm bay
    function spawnFireflies(num) {
      const box = document.getElementById('fireflies');
      for(let i=0;i<num;i++) {
        let ff=document.createElement('div');
        ff.className='firefly';
        ff.style.top=Math.random()*94+'vh';
        ff.style.left=Math.random()*98+'vw';
        ff.style.animationDelay=(Math.random()*11)+'s';
        ff.style.opacity=0.7+Math.random()*0.3;
        ff.style.transform=`scale(${0.7+Math.random()*0.6})`;
        box.appendChild(ff);
      }
    }
    spawnFireflies(19);
    // Nhạc Đom Đóm remix (có thể đổi link mp3 khác nếu muốn)
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    let musicPlaying = true;
    musicBtn.onclick = function() {
      musicPlaying = !musicPlaying;
      if(musicPlaying) { music.play(); musicBtn.innerHTML='⏸️';}
      else { music.pause(); musicBtn.innerHTML='▶️';}
    }
    // Tự động phát nhạc trên mobile có thể bị chặn, người dùng cần bấm mới phát.
    document.body.addEventListener('click',()=>{if(music.paused && musicPlaying)music.play();},{once:true});
  </script>
</body>
</html>
